<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Folder Media Player</title>
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --bg-panel: #2d2d2d;
            --text-main: #e0e0e0;
            --accent: #3498db;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Bar */
        header {
            padding: 15px;
            background-color: var(--bg-panel);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #444;
        }

        h1 { margin: 0; font-size: 1.2rem; }

        /* Custom File Input Button */
        .file-upload-btn {
            background-color: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .file-upload-btn:hover { background-color: #2980b9; }
        input[type="file"] { display: none; }

        /* Main Layout */
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar (File List) */
        .sidebar {
            width: 300px;
            background-color: var(--bg-panel);
            border-right: 1px solid #444;
            display: flex;
            flex-direction: column;
        }

        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex: 1;
        }

        .file-item {
            padding: 12px 15px;
            border-bottom: 1px solid #444;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-item:hover { background-color: #3d3d3d; }
        .file-item.active { background-color: var(--accent); color: white; }
        
        .file-icon { margin-right: 8px; }

        /* Main Player Area */
        .player-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: #000;
        }

        video, audio {
            max-width: 100%;
            max-height: 80vh;
            width: 100%;
            outline: none;
        }

        .status-msg {
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Media Player</h1>
        <!-- webkitdirectory allows folder selection -->
        <label for="folderInput" class="file-upload-btn">Select Folder</label>
        <input type="file" id="folderInput" webkitdirectory multiple>
    </header>

    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div style="padding:10px; border-bottom:1px solid #444; font-size:0.8rem; color:#888;">
                <span id="fileCount">0</span> files found
            </div>
            <ul class="file-list" id="fileList">
                <!-- Files will appear here -->
            </ul>
        </div>

        <!-- Main Screen -->
        <div class="player-stage">
            <div id="placeholder" class="status-msg">Select a folder to begin scanning...</div>
            <video id="mainPlayer" controls style="display:none;"></video>
            <audio id="audioPlayer" controls style="display:none;"></audio>
        </div>
    </div>

    <script>
        const folderInput = document.getElementById('folderInput');
        const fileListEl = document.getElementById('fileList');
        const fileCountEl = document.getElementById('fileCount');
        const videoPlayer = document.getElementById('mainPlayer');
        const audioPlayer = document.getElementById('audioPlayer');
        const placeholder = document.getElementById('placeholder');

        // Common media extensions
        const mediaExtensions = ['mp4', 'webm', 'ogg', 'mp3', 'wav', 'aac', 'flac', 'mkv', 'avi', 'mov'];

        let mediaFiles = [];

        folderInput.addEventListener('change', function(e) {
            const files = e.target.files;
            mediaFiles = [];
            fileListEl.innerHTML = '';
            
            // 1. Scan and Filter
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                // Check extension
                const extension = file.name.split('.').pop().toLowerCase();
                
                if (mediaExtensions.includes(extension)) {
                    mediaFiles.push(file);
                }
            }

            // 2. Sort alphabetically
            mediaFiles.sort((a, b) => a.name.localeCompare(b.name));

            // 3. Update UI Count
            fileCountEl.textContent = mediaFiles.length;

            if (mediaFiles.length === 0) {
                fileListEl.innerHTML = '<li class="file-item" style="color:#888">No media files found in this folder.</li>';
                return;
            }

            // 4. Render List
            mediaFiles.forEach((file, index) => {
                const li = document.createElement('li');
                li.className = 'file-item';
                li.innerHTML = `<span class="file-icon">🎵</span> ${file.name}`;
                li.onclick = () => loadMedia(index);
                fileListEl.appendChild(li);
            });
        });

        function loadMedia(index) {
            const file = mediaFiles[index];
            const fileUrl = URL.createObjectURL(file);
            const extension = file.name.split('.').pop().toLowerCase();
            const isVideo = ['mp4', 'webm', 'ogg', 'mkv', 'avi', 'mov'].includes(extension);

            // Highlight selected item
            document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
            if(fileListEl.children[index]) {
                fileListEl.children[index].classList.add('active');
            }

            // Hide placeholder
            placeholder.style.display = 'none';

            if (isVideo) {
                // Video Mode
                audioPlayer.style.display = 'none';
                audioPlayer.pause();
                
                videoPlayer.style.display = 'block';
                videoPlayer.src = fileUrl;
                videoPlayer.volume = 0.05; // Requirement: 5% volume
                videoPlayer.play();
            } else {
                // Audio Mode
                videoPlayer.style.display = 'none';
                videoPlayer.pause();

                audioPlayer.style.display = 'block';
                audioPlayer.src = fileUrl;
                audioPlayer.volume = 0.05; // Requirement: 5% volume
                audioPlayer.play();
            }
        }

        // Auto-play next file logic (Optional but good for UX)
        videoPlayer.onended = () => {
            const currentIndex = mediaFiles.findIndex(f => f === mediaFiles.find(f => videoPlayer.src.includes(f.name)));
            if(currentIndex > -1 && currentIndex < mediaFiles.length - 1) {
                loadMedia(currentIndex + 1);
            }
        };
        
        audioPlayer.onended = () => {
             const currentIndex = mediaFiles.findIndex(f => f === mediaFiles.find(f => audioPlayer.src.includes(f.name)));
            if(currentIndex > -1 && currentIndex < mediaFiles.length - 1) {
                loadMedia(currentIndex + 1);
            }
        }

    </script>
</body>
</html>
