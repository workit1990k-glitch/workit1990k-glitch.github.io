<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manga Reader</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
body { margin: 0; background: #111; color: white; font-family: sans-serif; user-select: none; }
#reader { padding-bottom: 100px; }
#reader img {
  display: block;
  margin: 0 auto;
  width: initial;
  height: auto;
  max-width: 100%;
  filter: contrast(var(--contrast, 1)) brightness(var(--brightness, 1)) grayscale(var(--grayscale, 0)) saturate(var(--saturate, 1));
  min-height: 100px;
  background: #1a1a1a;
}
#reader .chapter-marker {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
  pointer-events: none;
}
#tools {
  position: fixed; top: 10px; right: 10px; background: #222;
  padding: 12px; border-radius: 12px; display: none;
  width: 240px; z-index: 10;
  max-height: 80vh; overflow-y: auto;
}
#tools label { font-size: 12px; display: block; margin-bottom: 8px; }
#tools .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
#tools .slider-row input { flex: 1; }
#tools .slider-row span { min-width: 40px; text-align: right; font-size: 11px; color: #aaa; }
#tools select, #tools button { width: 100%; margin-top: 5px; }
#toggleTools, #openLibrary, #singleFileBtn {
  position: fixed; bottom: 20px; background: #444; border: none;
  padding: 10px 14px; color: white; cursor: pointer; border-radius: 8px; z-index: 20;
  font-size: 13px; transition: opacity 0.2s, transform 0.2s;
}
#toggleTools { right: 20px; }
#openLibrary { right: 110px; }
#singleFileBtn { right: 220px; }
#fileInput, #libraryInput { display: none; }
#library {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: #111; padding: 20px; overflow-y: auto; z-index: 30;
  grid-template-columns: repeat(auto-fill, 160px); gap: 16px;
}
#library.active { display: grid; }
.book {
  cursor: pointer; background: #222; padding: 8px; border-radius: 12px;
  text-align: center; transition: transform 0.1s, background 0.2s;
}
.book:hover { background: #333; transform: translateY(-2px); }
.book img {
  width: 100%; height: 220px; object-fit: cover; border-radius: 8px;
  background: #1a1a1a;
}
.book span {
  font-size: 12px; display: block; margin-top: 8px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
.progress-bar {
  position: fixed; top: 0; left: 0; height: 3px; background: #444; z-index: 40;
}
.progress-fill {
  height: 100%; background: #00a8ff; width: 0%; transition: width 0.2s;
}
.filter-label { display: flex; justify-content: space-between; align-items: center; }
#saveFiltersBtn, #resetFiltersBtn { 
  background: #00a8ff; margin-top: 8px; font-size: 12px; padding: 6px; border-radius: 6px; 
}
#saveFiltersBtn:hover, #resetFiltersBtn:hover { background: #008ecc; }
#resetFiltersBtn { background: #666; }
#resetFiltersBtn:hover { background: #555; }
.controls-hidden #toggleTools, 
.controls-hidden #openLibrary, 
.controls-hidden #singleFileBtn,
.controls-hidden #pageInfo,
.controls-hidden #chapterInfo {
  opacity: 0; pointer-events: none; transform: translateY(10px);
}
#chapterInfo {
  position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(34,34,34,0.9); padding: 6px 14px; border-radius: 20px;
  font-size: 12px; z-index: 15; display: none;
  transition: opacity 0.2s, transform 0.2s;
}
#chapterInfo.visible { display: block; }
#pageInfo {
  position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
  background: rgba(34,34,34,0.9); padding: 6px 14px; border-radius: 20px;
  font-size: 12px; z-index: 15; display: none;
  transition: opacity 0.2s, transform 0.2s;
}
#pageInfo.visible { display: block; }
#shortcutsHelp {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(34,34,34,0.95); padding: 20px; border-radius: 12px;
  z-index: 50; display: none; max-width: 400px;
}
#shortcutsHelp.active { display: block; }
#shortcutsHelp h3 { margin: 0 0 15px 0; font-size: 16px; }
#shortcutsHelp table { width: 100%; font-size: 12px; }
#shortcutsHelp td { padding: 4px 0; }
#shortcutsHelp kbd { 
  background: #444; padding: 2px 6px; border-radius: 4px; font-family: monospace; 
}
.img-placeholder {
  display: flex; align-items: center; justify-content: center;
  background: #1a1a1a; color: #555; font-size: 11px;
}
</style>
</head>
<body>

<input type="file" id="fileInput" accept=".zip,.cbz">
<input type="file" id="libraryInput" accept=".zip,.cbz" multiple>

<div id="library"></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div id="chapterInfo"></div>
<div id="pageInfo"></div>

<div id="shortcutsHelp">
  <h3>⌨️ Keyboard Shortcuts</h3>
  <table>
    <tr><td><kbd>A</kbd> / <kbd>←</kbd></td><td>Previous chapter</td></tr>
    <tr><td><kbd>D</kbd> / <kbd>→</kbd></td><td>Next chapter</td></tr>
    <tr><td><kbd>T</kbd></td><td>Toggle Tools</td></tr>
    <tr><td><kbd>L</kbd></td><td>Open Library</td></tr>
    <tr><td><kbd>O</kbd></td><td>Open File</td></tr>
    <tr><td><kbd>Space</kbd> / <kbd>C</kbd></td><td>Hide/Show Controls</td></tr>
    <tr><td><kbd>Ctrl+R</kbd></td><td>Reset Filters</td></tr>
    <tr><td><kbd>?</kbd></td><td>This Help</td></tr>
    <tr><td><kbd>Esc</kbd></td><td>Close Help/Library</td></tr>
  </table>
  <p style="text-align:center;margin-top:15px;color:#888;">Click outside or press Esc to close</p>
</div>

<div id="tools">
  <label>Jump to Chapter <select id="folderSelect"></select></label>
  
  <div class="slider-row">
    <label class="filter-label">Contrast <span id="contrastValue">1.00</span></label>
    <input type="range" id="contrast" min="80" max="150" value="100">
  </div>
  <div class="slider-row">
    <label class="filter-label">Brightness <span id="brightnessValue">1.00</span></label>
    <input type="range" id="brightness" min="80" max="150" value="100">
  </div>
  <div class="slider-row">
    <label class="filter-label">Saturate <span id="saturateValue">1.00</span></label>
    <input type="range" id="saturate" min="0" max="200" value="100">
  </div>
  <label><input type="checkbox" id="grayscale"> Grayscale (100%)</label>
  
  <button id="saveFiltersBtn">💾 Save Settings</button>
  <button id="resetFiltersBtn">↺ Reset to Default</button>
</div>

<button id="toggleTools">⚙️ Tools</button>
<button id="openLibrary">📚 Library</button>
<button id="singleFileBtn">📄 Open File</button>
<div id="reader"></div>

<script>
let zip, currentFolder = "", foldersList = [], currentZipName = "", allImages = [], chapterStartIndex = {};
let currentBlobURLs = [];
let imageCache = new Map(); // Cache for loaded image blobs
const root = document.documentElement;
const libraryEl = document.getElementById("library");
const progressFill = document.getElementById("progressFill");
const chapterInfo = document.getElementById("chapterInfo");
const pageInfo = document.getElementById("pageInfo");
const shortcutsHelp = document.getElementById("shortcutsHelp");
const thumbURLs = [];
let intersectionObserver = null;

// Filter elements
const contrast = document.getElementById("contrast");
const brightness = document.getElementById("brightness");
const saturate = document.getElementById("saturate");
const grayscaleToggle = document.getElementById("grayscale");
const contrastValue = document.getElementById("contrastValue");
const brightnessValue = document.getElementById("brightnessValue");
const saturateValue = document.getElementById("saturateValue");
const saveFiltersBtn = document.getElementById("saveFiltersBtn");
const resetFiltersBtn = document.getElementById("resetFiltersBtn");
const folderSelect = document.getElementById("folderSelect");
const readerEl = document.getElementById("reader");

// Default filter values
const DEFAULTS = { contrast: 100, brightness: 100, saturate: 100, grayscale: false };

/* ---------- FILTERS ---------- */
function updateFilters() {
  const contrastVal = contrast.value / 100;
  const brightnessVal = brightness.value / 100;
  const saturateVal = saturate.value / 100;
  const grayscaleVal = grayscaleToggle.checked ? 1 : 0;
  
  contrastValue.textContent = contrastVal.toFixed(2);
  brightnessValue.textContent = brightnessVal.toFixed(2);
  saturateValue.textContent = saturateVal.toFixed(2);
  
  root.style.setProperty('--contrast', contrastVal);
  root.style.setProperty('--brightness', brightnessVal);
  root.style.setProperty('--saturate', saturateVal);
  root.style.setProperty('--grayscale', grayscaleVal);
}

[contrast, brightness, saturate].forEach(el => el.oninput = updateFilters);
grayscaleToggle.onchange = updateFilters;

/* ---------- SAVE/LOAD/RESET FILTERS ---------- */
function saveFilters() {
  const settings = {
    contrast: contrast.value,
    brightness: brightness.value,
    saturate: saturate.value,
    grayscale: grayscaleToggle.checked
  };
  localStorage.setItem('mangaReaderFilters', JSON.stringify(settings));
  saveFiltersBtn.textContent = '✓ Saved!';
  setTimeout(() => saveFiltersBtn.textContent = '💾 Save Settings', 1500);
}

function loadFilters() {
  const saved = localStorage.getItem('mangaReaderFilters');
  if (!saved) return;
  try {
    const settings = JSON.parse(saved);
    if (settings.contrast) contrast.value = settings.contrast;
    if (settings.brightness) brightness.value = settings.brightness;
    if (settings.saturate) saturate.value = settings.saturate;
    if (settings.grayscale !== undefined) grayscaleToggle.checked = settings.grayscale;
    updateFilters();
  } catch(e) { console.warn('Failed to load filters:', e); }
}

function resetFilters() {
  contrast.value = DEFAULTS.contrast;
  brightness.value = DEFAULTS.brightness;
  saturate.value = DEFAULTS.saturate;
  grayscaleToggle.checked = DEFAULTS.grayscale;
  updateFilters();
  resetFiltersBtn.textContent = '✓ Reset!';
  setTimeout(() => resetFiltersBtn.textContent = '↺ Reset to Default', 1500);
}

saveFiltersBtn.onclick = saveFilters;
resetFiltersBtn.onclick = resetFilters;

/* ---------- MEMORY CLEANUP ---------- */
function cleanupBlobURLs() {
  currentBlobURLs.forEach(url => {
    try { URL.revokeObjectURL(url); } catch(e) {}
  });
  currentBlobURLs = [];
  imageCache.clear();
}

function cleanupThumbnails() {
  thumbURLs.forEach(url => {
    try { URL.revokeObjectURL(url); } catch(e) {}
  });
  thumbURLs.length = 0;
}

/* ---------- UI TOGGLE ON CLICK ONLY ---------- */
let controlsVisible = true;
document.addEventListener('click', (e) => {
  if (e.target.closest('#tools, #toggleTools, #openLibrary, #singleFileBtn, #folderSelect, input, button, .book, #library, #shortcutsHelp, #pageInfo, #chapterInfo')) return;
  
  controlsVisible = !controlsVisible;
  document.body.classList.toggle('controls-hidden', !controlsVisible);
  if (!controlsVisible) document.getElementById("tools").style.display = "none";
};

/* ---------- TOOLS PANEL ---------- */
document.getElementById("toggleTools").onclick = (e) => {
  e.stopPropagation();
  const tools = document.getElementById("tools");
  tools.style.display = tools.style.display === "none" ? "block" : "none";
};

/* ---------- LIBRARY & SINGLE FILE ---------- */
document.getElementById("openLibrary").onclick = (e) => {
  e.stopPropagation();
  libraryEl.innerHTML = '<div class="loading">Select ZIP/CBZ files...</div>';
  libraryEl.classList.add('active');
  progressFill.style.width = '0%';
  cleanupThumbnails();
  document.getElementById("libraryInput").click();
};

document.getElementById("singleFileBtn").onclick = (e) => {
  e.stopPropagation();
  cleanupBlobURLs();
  cleanupThumbnails();
  document.getElementById("fileInput").click();
};

document.getElementById("fileInput").onchange = async (e) => {
  const file = e.target.files[0];
  if (!file || !/\.(zip|cbz)$/i.test(file.name)) return;
  
  progressFill.style.width = '0%';
  libraryEl.innerHTML = `<div class="loading">Loading ${file.name}...</div>`;
  libraryEl.classList.add('active');
  
  try {
    await loadZipFile(file);
    libraryEl.classList.remove('active');
  } catch(err) {
    libraryEl.innerHTML = `<div class="loading" style="color:#f66">Error: ${err.message}</div>`;
  }
  progressFill.style.width = '0%';
  e.target.value = '';
};

/* ---------- THUMBNAIL EXTRACTION ---------- */
async function extractFirstImageThumbnail(file) {
  const zipTemp = await JSZip.loadAsync(file);
  const imagePath = Object.keys(zipTemp.files)
    .filter(p => !p.endsWith('/') && !p.includes('__MACOSX') && /\.(jpg|jpeg|png|webp)$/i.test(p))
    .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }))[0];
  
  if (!imagePath) return null;
  const blob = await zipTemp.files[imagePath].async("blob");
  const url = URL.createObjectURL(blob);
  thumbURLs.push(url);
  return url;
}

/* ---------- PARALLEL PROCESSING POOL ---------- */
async function processWithConcurrency(items, processor, concurrency = 3) {
  const results = new Array(items.length);
  const executing = [];
  let completed = 0;
  
  for (let i = 0; i < items.length; i++) {
    const index = i;
    const item = items[i];
    
    const promise = (async () => {
      try { return await processor(item, index); }
      catch(err) { console.warn('Processor error', index, err); return null; }
    })().then(result => {
      results[index] = result;
      const idx = executing.indexOf(promise);
      if (idx > -1) executing.splice(idx, 1);
      completed++;
      progressFill.style.width = `${Math.round((completed / items.length) * 100)}%`;
      return result;
    });
    
    executing.push(promise);
    if (executing.length >= concurrency) await Promise.race(executing);
  }
  await Promise.all(executing);
  return results;
}

/* ---------- LIBRARY LOADING ---------- */
document.getElementById("libraryInput").onchange = async (e) => {
  const files = Array.from(e.target.files).filter(f => /\.(zip|cbz)$/i.test(f.name));
  if (files.length === 0) {
    libraryEl.innerHTML = '<div class="loading">No ZIP/CBZ files selected</div>';
    return;
  }

  libraryEl.innerHTML = `<div class="loading">Scanning ${files.length} files...</div>`;
  
  const books = await processWithConcurrency(files, async (file, index) => {
    libraryEl.innerHTML = `<div class="loading">Processing ${index + 1}/${files.length}: ${file.name}</div>`;
    try {
      const thumbURL = await extractFirstImageThumbnail(file);
      return { file, name: file.name.replace(/\.(zip|cbz)$/i, ''), thumb: thumbURL };
    } catch (err) { console.warn('Skip:', file.name, err); return null; }
  }, 3);
  
  progressFill.style.width = '100%';
  setTimeout(() => progressFill.style.width = '0%', 300);
  renderLibrary(books.filter(b => b !== null));
  e.target.value = '';
};

function renderLibrary(books) {
  libraryEl.innerHTML = '';
  if (books.length === 0) {
    libraryEl.innerHTML = '<div class="loading">No valid manga files found</div>';
    return;
  }
  const placeholder = `image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="220"><rect fill="%23222" width="100%25" height="100%25"/><text x="50%25" y="50%25" fill="%23666" font-size="12" text-anchor="middle" dominant-baseline="middle">No Preview</text></svg>`;
  
  books.forEach(book => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<img src="${book.thumb || placeholder}" loading="lazy"><span title="${book.name}">${book.name}</span>`;
    div.onclick = async () => {
      cleanupBlobURLs();
      await loadZipFile(book.file);
      libraryEl.classList.remove('active');
    };
    libraryEl.appendChild(div);
  });
}

/* ---------- STREAMING ZIP LOAD - STRUCTURE ONLY ---------- */
async function loadZipFile(file) {
  cleanupBlobURLs();
  
  currentZipName = file.name.replace(/\.(zip|cbz)$/i, '');
  
  // Load zip structure only (fast streaming metadata parse)
  zip = await JSZip.loadAsync(file, { checkCRC32: false });
  
  const folders = new Set();
  Object.keys(zip.files).forEach(path => {
    const parts = path.split("/").filter(p => p);
    if (parts.length > 1) folders.add(parts[0]);
  });
  
  folderSelect.innerHTML = '<option value="">📁 All Pages (full manga)</option>';
  foldersList = ["", ...Array.from(folders).sort((a,b) => a.localeCompare(b, undefined, { numeric: true }))];
  
  foldersList.filter(f => f).forEach(f => {
    const opt = document.createElement("option");
    opt.value = f; opt.textContent = `📑 ${f}`;
    folderSelect.appendChild(opt);
  });
  
  currentFolder = "";
  folderSelect.value = "";
  await loadAllImagesStreaming();
  showChapterInfo("📖 " + currentZipName);
  window.scrollTo(0, 0);
}

/* ---------- STREAMING IMAGE LOADING WITH INTERSECTION OBSERVER ---------- */
async function loadAllImagesStreaming() {
  readerEl.innerHTML = '<div class="loading">📚 Reading manga structure...</div>';
  
  // Get all image paths - structure only, NO blob loading yet
  allImages = Object.keys(zip.files)
    .filter(p => !p.endsWith("/") && !p.includes('__MACOSX') && /\.(jpg|jpeg|png|webp)$/i.test(p))
    .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
  
  chapterStartIndex = {};
  readerEl.innerHTML = "";
  
  // Create placeholder elements for all images (instant)
  for (let i = 0; i < allImages.length; i++) {
    const path = allImages[i];
    const folder = path.includes("/") ? path.split("/")[0] : "";
    
    if (folder && !chapterStartIndex[folder]) {
      chapterStartIndex[folder] = { index: i, element: null };
    }
    
    // Create placeholder div that will become img when loaded
    const placeholder = document.createElement("div");
    placeholder.className = "img-placeholder";
    placeholder.textContent = `📄 Page ${i + 1}`;
    placeholder.dataset.path = path;
    placeholder.dataset.folder = folder;
    placeholder.dataset.index = i + 1;
    placeholder.style.height = "400px"; // Approximate height for layout
    
    if (folder && chapterStartIndex[folder].element === null) {
      chapterStartIndex[folder].element = placeholder;
    }
    
    readerEl.appendChild(placeholder);
  }
  
  // Setup IntersectionObserver for lazy loading images
  setupImageObserver();
  
  // Update page info with total count
  pageInfo.textContent = `📄 Page 1 / ${allImages.length}`;
  pageInfo.classList.add('visible');
}

/* ---------- INTERSECTION OBSERVER FOR STREAMING ---------- */
function setupImageObserver() {
  // Clean up existing observer
  if (intersectionObserver) {
    intersectionObserver.disconnect();
  }
  
  intersectionObserver = new IntersectionObserver(async (entries) => {
    for (const entry of entries) {
      if (entry.isIntersecting) {
        const placeholder = entry.target;
        const path = placeholder.dataset.path;
        
        // Skip if already loaded
        if (placeholder.tagName === 'IMG') continue;
        
        // Check cache first
        if (imageCache.has(path)) {
          replacePlaceholderWithImage(placeholder, imageCache.get(path));
          continue;
        }
        
        // Load image blob on-demand (streaming!)
        try {
          const blob = await zip.files[path].async("blob");
          const url = URL.createObjectURL(blob);
          imageCache.set(path, { url, blob });
          currentBlobURLs.push(url);
          replacePlaceholderWithImage(placeholder, { url, blob });
        } catch(e) {
          placeholder.textContent = `❌ Failed to load`;
          placeholder.style.color = '#f66';
          console.warn('Stream load fail:', path, e);
        }
      }
    }
  }, {
    rootMargin: '300px 0px', // Preload images 300px before they enter viewport
    threshold: 0.01
  });
  
  // Observe all placeholders
  readerEl.querySelectorAll('.img-placeholder').forEach(el => {
    intersectionObserver.observe(el);
  });
}

function replacePlaceholderWithImage(placeholder, imageData) {
  const img = document.createElement("img");
  img.src = imageData.url;
  img.loading = "lazy";
  img.alt = placeholder.dataset.path;
  img.dataset.path = placeholder.dataset.path;
  img.dataset.folder = placeholder.dataset.folder;
  img.dataset.index = placeholder.dataset.index;
  img.title = `Page ${placeholder.dataset.index} / ${allImages.length}`;
  
  // Preserve chapter marker reference
  const folder = placeholder.dataset.folder;
  if (folder && chapterStartIndex[folder]?.element === placeholder) {
    chapterStartIndex[folder].element = img;
  }
  
  placeholder.replaceWith(img);
}

/* ---------- PAGE INFO DISPLAY ---------- */
function updatePageInfo() {
  if (allImages.length === 0) return;
  
  const scrollTop = window.scrollY;
  const viewportHeight = window.innerHeight;
  const images = readerEl.querySelectorAll('img, .img-placeholder');
  
  let currentPage = 1;
  images.forEach((el, index) => {
    const rect = el.getBoundingClientRect();
    if (rect.top < viewportHeight / 2 && rect.bottom > 0) {
      currentPage = index + 1;
    }
  });
  
  pageInfo.textContent = `📄 Page ${currentPage} / ${allImages.length}`;
}

let scrollTimeout;
window.addEventListener('scroll', () => {
  if (allImages.length > 0) {
    // Debounce scroll updates for performance
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(updatePageInfo, 50);
  }
}, { passive: true });

/* ---------- CHAPTER NAVIGATION ---------- */
function scrollToChapter(folder) {
  if (!folder) {
    window.scrollTo({ top: 0, behavior: "smooth" });
    showChapterInfo("📖 All Pages");
    return;
  }
  
  const chapterData = chapterStartIndex[folder];
  if (chapterData && chapterData.element) {
    chapterData.element.scrollIntoView({ behavior: "smooth", block: "start" });
    showChapterInfo(`📑 Jumped to: ${folder}`);
  }
}

folderSelect.onchange = () => scrollToChapter(folderSelect.value);

function showChapterInfo(text) {
  chapterInfo.textContent = text;
  chapterInfo.classList.add('visible');
  setTimeout(() => chapterInfo.classList.remove('visible'), 2500);
}

/* ---------- KEYBOARD NAVIGATION ---------- */
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    libraryEl.classList.remove('active');
    shortcutsHelp.classList.remove('active');
    return;
  }
  
  if (e.key === "?" || (e.key === "/" && e.shiftKey)) {
    e.preventDefault();
    shortcutsHelp.classList.toggle('active');
    return;
  }
  
  if (libraryEl.classList.contains('active') || shortcutsHelp.classList.contains('active')) return;
  
  if ((e.key === "d" || e.key === "ArrowRight") && foldersList.length > 1) {
    const idx = foldersList.indexOf(currentFolder);
    const nextIdx = (idx + 1) % foldersList.length;
    currentFolder = foldersList[nextIdx];
    folderSelect.value = currentFolder;
    scrollToChapter(currentFolder);
  }
  if ((e.key === "a" || e.key === "ArrowLeft") && foldersList.length > 1) {
    const idx = foldersList.indexOf(currentFolder);
    const prevIdx = (idx - 1 + foldersList.length) % foldersList.length;
    currentFolder = foldersList[prevIdx];
    folderSelect.value = currentFolder;
    scrollToChapter(currentFolder);
  }
  
  if (e.key === "t") {
    e.stopPropagation();
    const tools = document.getElementById("tools");
    tools.style.display = tools.style.display === "none" ? "block" : "none";
  }
  if (e.key === "l") { e.stopPropagation(); document.getElementById("openLibrary").click(); }
  if (e.key === "o") { e.stopPropagation(); document.getElementById("singleFileBtn").click(); }
  if (e.key === " " || e.key === "c") {
    e.preventDefault();
    controlsVisible = !controlsVisible;
    document.body.classList.toggle('controls-hidden', !controlsVisible);
    if (!controlsVisible) document.getElementById("tools").style.display = "none";
  }
  if (e.key === "r" && e.ctrlKey) { e.preventDefault(); resetFilters(); }
});

shortcutsHelp.addEventListener('click', (e) => {
  if (e.target === shortcutsHelp) {
    shortcutsHelp.classList.remove('active');
  }
});

/* ---------- INIT & CLEANUP ---------- */
window.addEventListener('beforeunload', () => {
  cleanupBlobURLs();
  cleanupThumbnails();
  if (intersectionObserver) intersectionObserver.disconnect();
});

// Handle window resize to re-trigger lazy loading if needed
window.addEventListener('resize', () => {
  if (intersectionObserver && readerEl.querySelectorAll('.img-placeholder').length > 0) {
    // Re-observe placeholders in case layout changed
    readerEl.querySelectorAll('.img-placeholder').forEach(el => {
      if (!intersectionObserver.takeRecords().some(r => r.target === el)) {
        intersectionObserver.observe(el);
      }
    });
  }
});

loadFilters();
</script>
</body>
</html>
