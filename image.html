<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8e9ff;
        }

        .upload-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            font-size: 1.1rem;
        }

        #fileInput {
            display: none;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .preview-container {
            margin-top: 30px;
            display: none;
        }

        .preview-image {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .stats {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #666;
            font-weight: 500;
        }

        .stat-value {
            color: #333;
            font-weight: 700;
        }

        .stat-value.decreased {
            color: #27ae60;
        }

        .stat-value.increased {
            color: #e74c3c;
        }

        .message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .file-name {
            text-align: center;
            color: #666;
            margin-top: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Image Resizer</h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Click or drag image here</div>
            <div class="file-name" id="fileName"></div>
        </div>
        
        <input type="file" id="fileInput" accept="image/*">
        
        <button class="btn" id="resizeBtn" disabled>Resize Image</button>
        
        <div class="message" id="message"></div>
        
        <div class="preview-container" id="previewContainer">
            <img class="preview-image" id="previewImage" alt="Preview">
            
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Original Size:</span>
                    <span class="stat-value" id="originalSize">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Resized Size:</span>
                    <span class="stat-value" id="resizedSize">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Size Reduction:</span>
                    <span class="stat-value" id="sizeReduction">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Original Width:</span>
                    <span class="stat-value" id="originalWidth">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Resized Width:</span>
                    <span class="stat-value" id="resizedWidth">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Width Reduction:</span>
                    <span class="stat-value" id="widthReduction">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const resizeBtn = document.getElementById('resizeBtn');
        const fileName = document.getElementById('fileName');
        const message = document.getElementById('message');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');

        let selectedFile = null;

        // Upload area click
        uploadArea.addEventListener('click', () => fileInput.click());

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // Handle file selection
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showMessage('Please select an image file!', 'error');
                return;
            }

            selectedFile = file;
            fileName.textContent = file.name;
            resizeBtn.disabled = false;
            showMessage('', '');
            previewContainer.style.display = 'none';

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Resize button click
        resizeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            try {
                const imageData = await resizeImage(selectedFile);
                
                if (imageData.skipped) {
                    showMessage(imageData.message, 'error');
                    return;
                }

                // Display statistics
                displayStats(imageData);

                // Open resized image in new page
                openResizedImage(imageData);

                showMessage('Image resized successfully! Opening in new tab...', 'success');
            } catch (error) {
                showMessage('Error processing image: ' + error.message, 'error');
            }
        });

        // Resize image function
        async function resizeImage(file) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const reader = new FileReader();

                reader.onload = (e) => {
                    img.onload = () => {
                        const originalWidth = img.width;
                        const originalHeight = img.height;
                        const originalSize = file.size;

                        // Check if width is already under max
                        if (originalWidth <= 1080) {
                            resolve({
                                skipped: true,
                                message: `Image width (${originalWidth}px) is already under 1080px. Skipping resize.`
                            });
                            return;
                        }

                        // Calculate new dimensions (maintain aspect ratio)
                        const maxWidth = 1080;
                        const scaleFactor = maxWidth / originalWidth;
                        const newWidth = maxWidth;
                        const newHeight = Math.round(originalHeight * scaleFactor);

                        // Create canvas
                        const canvas = document.createElement('canvas');
                        canvas.width = newWidth;
                        canvas.height = newHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, newWidth, newHeight);

                        // Convert to WebP with 75% quality
                        canvas.toBlob((blob) => {
                            const resizedSize = blob.size;

                            // Check if processed size > original
                            if (resizedSize > originalSize) {
                                resolve({
                                    skipped: true,
                                    message: `Processed size (${formatSize(resizedSize)}) is larger than original (${formatSize(originalSize)}). Skipping.`
                                });
                                return;
                            }

                            // Calculate statistics
                            const sizeReduction = ((originalSize - resizedSize) / originalSize * 100).toFixed(2);
                            const widthReduction = ((originalWidth - newWidth) / originalWidth * 100).toFixed(2);

                            resolve({
                                skipped: false,
                                blob: blob,
                                originalSize: originalSize,
                                resizedSize: resizedSize,
                                sizeReduction: sizeReduction,
                                originalWidth: originalWidth,
                                resizedWidth: newWidth,
                                widthReduction: widthReduction,
                                originalHeight: originalHeight,
                                resizedHeight: newHeight
                            });
                        }, 'image/webp', 0.75);
                    };

                    img.onerror = () => reject(new Error('Failed to load image'));
                    img.src = e.target.result;
                };

                reader.onerror = () => reject(new Error('Failed to read file'));
                reader.readAsDataURL(file);
            });
        }

        // Display statistics
        function displayStats(data) {
            document.getElementById('originalSize').textContent = formatSize(data.originalSize);
            document.getElementById('resizedSize').textContent = formatSize(data.resizedSize);
            document.getElementById('sizeReduction').textContent = `${data.sizeReduction}%`;
            document.getElementById('sizeReduction').className = 'stat-value decreased';

            document.getElementById('originalWidth').textContent = `${data.originalWidth}px`;
            document.getElementById('resizedWidth').textContent = `${data.resizedWidth}px`;
            document.getElementById('widthReduction').textContent = `${data.widthReduction}%`;
            document.getElementById('widthReduction').className = 'stat-value decreased';

            previewContainer.style.display = 'block';
        }

        // Open resized image in new page
        function openResizedImage(data) {
            const url = URL.createObjectURL(data.blob);
            const newWindow = window.open();
            newWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Resized Image</title>
                    <style>
                        body {
                            margin: 0;
                            padding: 20px;
                            background: #f5f5f5;
                            font-family: Arial, sans-serif;
                            text-align: center;
                        }
                        img {
                            max-width: 100%;
                            border-radius: 10px;
                            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
                        }
                        .download-btn {
                            display: inline-block;
                            margin-top: 20px;
                            padding: 15px 30px;
                            background: #667eea;
                            color: white;
                            text-decoration: none;
                            border-radius: 10px;
                            font-size: 1.1rem;
                        }
                        .download-btn:hover {
                            background: #764ba2;
                        }
                    </style>
                </head>
                <body>
                    <h1>✅ Resized Image</h1>
                    <img src="${url}" alt="Resized Image">
                    <br>
                    <a href="${url}" download="resized-image.webp" class="download-btn">📥 Download Image</a>
                </body>
                </html>
            `);
        }

        // Format size
        function formatSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Show message
        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type;
        }
    </script>
</body>
</html>
