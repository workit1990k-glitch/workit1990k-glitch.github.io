<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 700px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8e9ff;
        }

        .upload-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            font-size: 1.1rem;
        }

        #fileInput {
            display: none;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .preview-container {
            margin-top: 30px;
            display: none;
        }

        .preview-section {
            margin-bottom: 30px;
        }

        .preview-title {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .preview-image {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .comparison {
                grid-template-columns: 1fr;
            }
        }

        .image-box {
            text-align: center;
        }

        .image-box img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stats {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #666;
            font-weight: 500;
        }

        .stat-value {
            color: #333;
            font-weight: 700;
        }

        .stat-value.decreased {
            color: #27ae60;
        }

        .stat-value.increased {
            color: #e74c3c;
        }

        .stat-value.neutral {
            color: #667eea;
        }

        .message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .file-name {
            text-align: center;
            color: #666;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .download-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .download-btn:hover {
            transform: translateY(-2px);
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 10px;
        }

        .badge-resized {
            background: #667eea;
            color: white;
        }

        .badge-converted {
            background: #f39c12;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Image Resizer</h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Click or drag image here</div>
            <div class="file-name" id="fileName"></div>
        </div>
        
        <input type="file" id="fileInput" accept="image/*">
        
        <button class="btn" id="resizeBtn" disabled>Process Image</button>
        
        <div class="message" id="message"></div>
        
        <div class="preview-container" id="previewContainer">
            <div class="comparison">
                <div class="image-box">
                    <div class="preview-title">Original Image</div>
                    <img class="preview-image" id="originalImage" alt="Original">
                </div>
                <div class="image-box">
                    <div class="preview-title">
                        Processed Image 
                        <span class="badge" id="processBadge"></span>
                    </div>
                    <img class="preview-image" id="processedImage" alt="Processed">
                </div>
            </div>
            
            <button class="download-btn" id="downloadBtn">📥 Download Processed Image</button>
            
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Original Size:</span>
                    <span class="stat-value" id="originalSize">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Processed Size:</span>
                    <span class="stat-value" id="processedSize">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Size Reduction:</span>
                    <span class="stat-value" id="sizeReduction">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Original Dimensions:</span>
                    <span class="stat-value" id="originalDimensions">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Processed Dimensions:</span>
                    <span class="stat-value" id="processedDimensions">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Width Change:</span>
                    <span class="stat-value" id="widthChange">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Format:</span>
                    <span class="stat-value" id="formatChange">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const resizeBtn = document.getElementById('resizeBtn');
        const fileName = document.getElementById('fileName');
        const message = document.getElementById('message');
        const previewContainer = document.getElementById('previewContainer');
        const originalImage = document.getElementById('originalImage');
        const processedImage = document.getElementById('processedImage');
        const downloadBtn = document.getElementById('downloadBtn');
        const processBadge = document.getElementById('processBadge');

        let selectedFile = null;
        let processedBlob = null;

        // Upload area click
        uploadArea.addEventListener('click', () => fileInput.click());

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // Handle file selection
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showMessage('Please select an image file!', 'error');
                return;
            }

            selectedFile = file;
            fileName.textContent = file.name;
            resizeBtn.disabled = false;
            showMessage('', '');
            previewContainer.style.display = 'none';
            processedBlob = null;

            // Show original preview
            const reader = new FileReader();
            reader.onload = (e) => {
                originalImage.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Process button click
        resizeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            try {
                const imageData = await processImage(selectedFile);
                
                // Display processed image
                const url = URL.createObjectURL(imageData.blob);
                processedImage.src = url;
                processedBlob = imageData.blob;

                // Set badge
                if (imageData.resized) {
                    processBadge.textContent = 'Resized';
                    processBadge.className = 'badge badge-resized';
                } else {
                    processBadge.textContent = 'Converted';
                    processBadge.className = 'badge badge-converted';
                }

                // Display statistics
                displayStats(imageData);

                // Setup download button
                downloadBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'processed-image.webp';
                    a.click();
                };

                showMessage(imageData.message, imageData.resized ? 'success' : 'info');
            } catch (error) {
                showMessage('Error processing image: ' + error.message, 'error');
            }
        });

        // Process image function
        async function processImage(file) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const reader = new FileReader();

                reader.onload = (e) => {
                    img.onload = () => {
                        const originalWidth = img.width;
                        const originalHeight = img.height;
                        const originalSize = file.size;

                        let newWidth, newHeight, resized = false;

                        // Check if width is over max
                        if (originalWidth > 1080) {
                            // Calculate new dimensions (maintain aspect ratio)
                            const maxWidth = 1080;
                            const scaleFactor = maxWidth / originalWidth;
                            newWidth = maxWidth;
                            newHeight = Math.round(originalHeight * scaleFactor);
                            resized = true;
                        } else {
                            // Keep original dimensions
                            newWidth = originalWidth;
                            newHeight = originalHeight;
                        }

                        // Create canvas
                        const canvas = document.createElement('canvas');
                        canvas.width = newWidth;
                        canvas.height = newHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, newWidth, newHeight);

                        // Convert to WebP with 75% quality
                        canvas.toBlob((blob) => {
                            const processedSize = blob.size;

                            // Calculate statistics
                            const sizeReduction = ((originalSize - processedSize) / originalSize * 100).toFixed(2);
                            const widthChange = originalWidth - newWidth;
                            const widthChangePercent = ((originalWidth - newWidth) / originalWidth * 100).toFixed(2);

                            let message = '';
                            if (resized) {
                                message = `✅ Image resized from ${originalWidth}px to ${newWidth}px width and converted to WebP!`;
                            } else {
                                message = `ℹ️ Image width (${originalWidth}px) is under 1080px. Only converted to WebP format!`;
                            }

                            resolve({
                                blob: blob,
                                originalSize: originalSize,
                                processedSize: processedSize,
                                sizeReduction: sizeReduction,
                                originalWidth: originalWidth,
                                originalHeight: originalHeight,
                                processedWidth: newWidth,
                                processedHeight: newHeight,
                                widthChange: widthChange,
                                widthChangePercent: widthChangePercent,
                                resized: resized,
                                message: message
                            });
                        }, 'image/webp', 0.75);
                    };

                    img.onerror = () => reject(new Error('Failed to load image'));
                    img.src = e.target.result;
                };

                reader.onerror = () => reject(new Error('Failed to read file'));
                reader.readAsDataURL(file);
            });
        }

        // Display statistics
        function displayStats(data) {
            document.getElementById('originalSize').textContent = formatSize(data.originalSize);
            document.getElementById('processedSize').textContent = formatSize(data.processedSize);
            
            const sizeReductionEl = document.getElementById('sizeReduction');
            sizeReductionEl.textContent = `${data.sizeReduction}%`;
            if (data.sizeReduction > 0) {
                sizeReductionEl.className = 'stat-value decreased';
            } else if (data.sizeReduction < 0) {
                sizeReductionEl.className = 'stat-value increased';
            } else {
                sizeReductionEl.className = 'stat-value neutral';
            }

            document.getElementById('originalDimensions').textContent = `${data.originalWidth} × ${data.originalHeight}px`;
            document.getElementById('processedDimensions').textContent = `${data.processedWidth} × ${data.processedHeight}px`;
            
            const widthChangeEl = document.getElementById('widthChange');
            if (data.widthChange > 0) {
                widthChangeEl.textContent = `-${data.widthChange}px (${data.widthChangePercent}%)`;
                widthChangeEl.className = 'stat-value decreased';
            } else if (data.widthChange < 0) {
                widthChangeEl.textContent = `+${Math.abs(data.widthChange)}px (${Math.abs(data.widthChangePercent)}%)`;
                widthChangeEl.className = 'stat-value increased';
            } else {
                widthChangeEl.textContent = 'No change';
                widthChangeEl.className = 'stat-value neutral';
            }

            document.getElementById('formatChange').textContent = '→ WebP (75% quality)';
            document.getElementById('formatChange').className = 'stat-value neutral';

            previewContainer.style.display = 'block';
        }

        // Format size
        function formatSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Show message
        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type;
        }
    </script>
</body>
</html>
