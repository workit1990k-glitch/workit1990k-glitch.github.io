<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manga Reader</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
body { margin: 0; background: #111; color: white; font-family: sans-serif; }
#reader { padding-bottom: 100px; }
#reader img {
  display: block; margin: 0 auto; width: var(--zoom, 100%);
  max-width: 1000px; transition: width 0.2s ease;
  filter: var(--sharpenFilter) contrast(var(--contrast, 1)) brightness(var(--brightness, 1));
}
#tools {
  position: fixed; top: 10px; right: 10px; background: #222;
  padding: 12px; border-radius: 12px; display: none;
  width: 220px; z-index: 10;
}
#tools label { font-size: 12px; display: block; }
#tools input, #tools select { width: 100%; margin-bottom: 10px; }
#toggleTools, #prevChapter, #nextChapter, #openLibrary, #backToLibrary {
  position: fixed; bottom: 20px; background: #444; border: none;
  padding: 10px 14px; color: white; cursor: pointer; border-radius: 8px; z-index: 20;
}
#toggleTools { right: 20px; }
#prevChapter { left: 20px; }
#nextChapter { left: 90px; }
#openLibrary { left: 180px; }
#backToLibrary { left: 20px; display: none; }
#backToLibrary.visible { display: block; }
#fileInput, #libraryInput { display: none; }
#library {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: #111; padding: 20px; overflow-y: auto; z-index: 30;
  grid-template-columns: repeat(auto-fill, 160px); gap: 16px;
}
#library.active { display: grid; }
.book {
  cursor: pointer; background: #222; padding: 8px; border-radius: 12px;
  text-align: center; transition: transform 0.1s, background 0.2s;
}
.book:hover { background: #333; transform: translateY(-2px); }
.book img {
  width: 100%; height: 220px; object-fit: cover; border-radius: 8px;
  background: #1a1a1a;
}
.book span {
  font-size: 12px; display: block; margin-top: 8px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
</style>
</head>
<body>

<svg width="0" height="0">
  <filter id="sharpenFilter">
    <feConvolveMatrix id="kernel" kernelMatrix="0 -0.1 0 -0.1 1.2 -0.1 0 -0.1 0" divisor="1"/>
  </filter>
</svg>

<input type="file" id="fileInput" accept=".zip,.cbz">
<input type="file" id="libraryInput" accept=".zip,.cbz" multiple>

<div id="library"></div>
<div id="tools">
  <label>Folder <select id="folderSelect"></select></label>
  <label>Zoom <input type="range" id="zoom" min="100" max="200" value="100"></label>
  <label>Contrast <input type="range" id="contrast" min="80" max="150" value="100"></label>
  <label>Brightness <input type="range" id="brightness" min="80" max="150" value="100"></label>
  <label>Sharpness <input type="range" id="sharpness" min="0" max="5" value="0"></label>
</div>

<button id="toggleTools">Tools</button>
<button id="prevChapter">Prev</button>
<button id="nextChapter">Next</button>
<button id="openLibrary">📚 Library</button>
<button id="backToLibrary">← Library</button>
<div id="reader"></div>

<script>
let zip, currentFolder = "", foldersList = [], currentZipName = "";
const root = document.documentElement, kernel = document.getElementById("kernel");
const libraryEl = document.getElementById("library"), backToLibraryBtn = document.getElementById("backToLibrary");
const thumbURLs = []; // Track thumbnail URLs for cleanup

/* ---------- FILTERS ---------- */
function updateFilters() {
  root.style.setProperty('--zoom', zoom.value + '%');
  root.style.setProperty('--contrast', contrast.value / 100);
  root.style.setProperty('--brightness', brightness.value / 100);
  const s = parseInt(sharpness.value);
  if (s === 0) { root.style.setProperty('--sharpenFilter', ''); return; }
  const surround = (-0.03 * s).toFixed(2), center = (1 + 0.12 * s).toFixed(2);
  kernel.setAttribute("kernelMatrix", `0 ${surround} 0 ${surround} ${center} ${surround} 0 ${surround} 0`);
  root.style.setProperty('--sharpenFilter', 'url(#sharpenFilter)');
}
[zoom, contrast, brightness, sharpness].forEach(el => el.oninput = updateFilters);

/* ---------- UI ---------- */
toggleTools.onclick = () => tools.style.display = tools.style.display === "none" ? "block" : "none";

openLibrary.onclick = async () => {
  libraryEl.innerHTML = '<div class="loading">Select ZIP/CBZ files...</div>';
  libraryEl.classList.add('active');
  backToLibraryBtn.classList.remove('visible');
  cleanupThumbnails(); // Free old thumbnail memory
  libraryInput.click();
};

backToLibraryBtn.onclick = () => {
  libraryEl.classList.remove('active');
  if (zip) backToLibraryBtn.classList.add('visible');
};

function cleanupThumbnails() {
  thumbURLs.forEach(URL.revokeObjectURL);
  thumbURLs.length = 0;
}

/* ---------- STREAMLINED ZIP THUMBNAIL EXTRACTION ---------- */
async function extractFirstImageThumbnail(file) {
  // Load only ZIP structure (central directory), not file contents
  const zipTemp = await JSZip.loadAsync(file);
  
  // Find first valid image file - optimized search
  const imagePath = Object.keys(zipTemp.files)
    .filter(p => !p.endsWith('/') && !p.includes('__MACOSX') && /\.(jpg|jpeg|png|webp)$/i.test(p))
    .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }))[0];
  
  if (!imagePath) return null;
  
  // Extract ONLY this one file's content
  const blob = await zipTemp.files[imagePath].async("blob");
  const url = URL.createObjectURL(blob);
  thumbURLs.push(url); // Track for later cleanup
  
  return url;
}

/* ---------- LIBRARY LOADING ---------- */
libraryInput.onchange = async (e) => {
  const files = Array.from(e.target.files).filter(f => /\.(zip|cbz)$/i.test(f.name));
  if (files.length === 0) {
    libraryEl.innerHTML = '<div class="loading">No ZIP/CBZ files selected</div>';
    return;
  }

  libraryEl.innerHTML = `<div class="loading">Scanning ${files.length} files...</div>`;
  const books = [];
  
  // Process files sequentially to avoid memory spikes
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    libraryEl.innerHTML = `<div class="loading">Processing ${i+1}/${files.length}: ${file.name}</div>`;
    
    try {
      const thumbURL = await extractFirstImageThumbnail(file);
      books.push({
        file: file,
        name: file.name.replace(/\.(zip|cbz)$/i, ''),
        thumb: thumbURL
      });
      // zipTemp is garbage collected here - we don't keep it!
    } catch (err) {
      console.warn('Skip:', file.name, err);
    }
    
    // Yield to UI thread periodically for responsiveness
    if (i % 5 === 0) await new Promise(r => setTimeout(r, 0));
  }
  
  renderLibrary(books);
};

function renderLibrary(books) {
  libraryEl.innerHTML = '';
  if (books.length === 0) {
    libraryEl.innerHTML = '<div class="loading">No valid manga files found</div>';
    return;
  }
  
  const placeholder = `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="220"><rect fill="%23222" width="100%25" height="100%25"/><text x="50%25" y="50%25" fill="%23666" font-size="12" text-anchor="middle" dominant-baseline="middle">No Preview</text></svg>`;
  
  books.forEach(book => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<img src="${book.thumb || placeholder}" loading="lazy"><span title="${book.name}">${book.name}</span>`;
    div.onclick = async () => {
      await loadZipFile(book.file);
      libraryEl.classList.remove('active');
      backToLibraryBtn.classList.add('visible');
    };
    libraryEl.appendChild(div);
  });
}

/* ---------- LOAD ZIP FOR READING ---------- */
async function loadZipFile(file) {
  currentZipName = file.name.replace(/\.(zip|cbz)$/i, '');
  zip = await JSZip.loadAsync(file);
  
  const folders = new Set();
  Object.keys(zip.files).forEach(path => {
    const parts = path.split("/").filter(p => p);
    if (parts.length > 1) folders.add(parts[0]);
  });
  
  folderSelect.innerHTML = "";
  foldersList = folders.size > 0 
    ? Array.from(folders).sort((a,b) => a.localeCompare(b, undefined, { numeric: true })) 
    : [""];
  
  foldersList.forEach(f => {
    const opt = document.createElement("option");
    opt.value = f; opt.textContent = f || "(root)";
    folderSelect.appendChild(opt);
  });
  
  currentFolder = folderSelect.value;
  loadFolder();
  window.scrollTo(0, 0);
}

/* ---------- NAVIGATION & RENDERING ---------- */
function changeChapter(direction) {
  const index = foldersList.indexOf(currentFolder) + direction;
  if (index < 0 || index >= foldersList.length) return;
  currentFolder = foldersList[index];
  folderSelect.value = currentFolder;
  loadFolder();
  window.scrollTo(0, 0);
}
prevChapter.onclick = () => changeChapter(-1);
nextChapter.onclick = () => changeChapter(1);
folderSelect.onchange = () => { currentFolder = folderSelect.value; loadFolder(); };

async function loadFolder() {
  reader.innerHTML = "";
  const prefix = currentFolder ? currentFolder + "/" : "";
  const files = Object.keys(zip.files)
    .filter(p => p.startsWith(prefix) && !p.endsWith("/") && !p.includes('__MACOSX'))
    .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
  
  for (const path of files) {
    if (!/\.(jpg|jpeg|png|webp)$/i.test(path)) continue;
    try {
      const blob = await zip.files[path].async("blob");
      const url = URL.createObjectURL(blob);
      const img = document.createElement("img");
      img.src = url; img.loading = "lazy"; img.alt = path;
      reader.appendChild(img);
    } catch(e) { console.warn('Image load fail:', path, e); }
  }
}

/* ---------- AUTO-SCROLL & KEYBOARD ---------- */
let scrollCooldown = false;
window.addEventListener("scroll", () => {
  if (scrollCooldown || !zip) return;
  const { scrollY, innerHeight } = window, docH = document.body.offsetHeight;
  if (scrollY + innerHeight >= docH - 10) {
    scrollCooldown = true; changeChapter(1);
    setTimeout(() => scrollCooldown = false, 800);
  }
  if (scrollY <= 0) {
    scrollCooldown = true; changeChapter(-1);
    setTimeout(() => scrollCooldown = false, 800);
  }
});

document.addEventListener("keydown", (e) => {
  if (libraryEl.classList.contains('active')) return;
  if (e.key === "d" || e.key === "ArrowRight") changeChapter(1);
  if (e.key === "a" || e.key === "ArrowLeft") changeChapter(-1);
  if (e.key === "t") toggleTools.click();
  if (e.key === "l") openLibrary.click();
});

/* ---------- INIT ---------- */
backToLibraryBtn.classList.remove('visible');
window.addEventListener('beforeunload', cleanupThumbnails);
</script>
</body>
</html>
