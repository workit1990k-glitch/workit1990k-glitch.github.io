<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manga Reader</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: sans-serif;
}

/* Reader */
#reader {
  padding-bottom: 100px;
}

#reader img {
  display: block;
  margin: 0 auto;
  width: var(--zoom, 100%);
  max-width: 1000px;

  transition: width 0.2s ease;

  filter:
    var(--sharpenFilter)
    contrast(var(--contrast, 1))
    brightness(var(--brightness, 1));
}

/* Tools */
#tools {
  position: fixed;
  top: 10px;
  right: 10px;
  background: #222;
  padding: 12px;
  border-radius: 12px;
  display: none;
  width: 220px;
  z-index: 10;
}

#tools label {
  font-size: 12px;
  display: block;
}

#tools input, #tools select {
  width: 100%;
  margin-bottom: 10px;
}

/* Buttons */
#toggleTools {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #444;
  border: none;
  padding: 12px 16px;
  border-radius: 50px;
  color: white;
  cursor: pointer;
}

#prevChapter, #nextChapter {
  position: fixed;
  bottom: 20px;
  left: 20px;
  margin-right: 10px;
  background: #444;
  border: none;
  padding: 10px 14px;
  color: white;
  cursor: pointer;
}

#nextChapter {
  left: 90px;
}

/* File input */
#fileInput {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10;
}

  #library {
  display: grid;
  grid-template-columns: repeat(auto-fill, 140px);
  gap: 12px;
  padding: 20px;
}

.book {
  cursor: pointer;
  background: #222;
  padding: 8px;
  border-radius: 8px;
  text-align: center;
}

.book img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 6px;
}

.book span {
  font-size: 12px;
  display: block;
  margin-top: 6px;
}
</style>
</head>

<body>

<!-- SHARPEN FILTER -->
<svg width="0" height="0">
  <filter id="sharpenFilter">
    <feConvolveMatrix id="kernel"
      kernelMatrix="0 -0.1 0 -0.1 1.2 -0.1 0 -0.1 0"
      divisor="1"/>
  </filter>
</svg>

<input type="file" id="fileInput" accept=".zip,.cbz">
<br>
<button id="openLibrary">Library</button>
<input type="file" id="libraryInput" webkitdirectory multiple style="display:none">

<div id="library"></div>
<div id="tools">
  <label>Folder</label>
  <select id="folderSelect"></select>

  <label>Zoom</label>
  <input type="range" id="zoom" min="100" max="200" value="100">

  <label>Contrast</label>
  <input type="range" id="contrast" min="80" max="150" value="100">

  <label>Brightness</label>
  <input type="range" id="brightness" min="80" max="150" value="100">

  <label>Sharpness</label>
  <input type="range" id="sharpness" min="0" max="5" value="0">
</div>

<button id="toggleTools">Tools</button>
<button id="prevChapter">Prev</button>
<button id="nextChapter">Next</button>

<div id="reader"></div>

<script>
let zip;
let currentFolder = "";
let foldersList = [];

const root = document.documentElement;
const kernel = document.getElementById("kernel");

/* ---------------- FILTERS ---------------- */

function updateFilters() {
  root.style.setProperty('--zoom', zoom.value + '%');
  root.style.setProperty('--contrast', contrast.value / 100);
  root.style.setProperty('--brightness', brightness.value / 100);

  const s = parseInt(sharpness.value);

  if (s === 0) {
    root.style.setProperty('--sharpenFilter', '');
    return;
  }

  const surround = (-0.03 * s).toFixed(2);
  const center = (1 + 0.12 * s).toFixed(2);

  kernel.setAttribute(
    "kernelMatrix",
    `0 ${surround} 0 ${surround} ${center} ${surround} 0 ${surround} 0`
  );

  root.style.setProperty('--sharpenFilter', 'url(#sharpenFilter)');
}

zoom.oninput = updateFilters;
contrast.oninput = updateFilters;
brightness.oninput = updateFilters;
sharpness.oninput = updateFilters;

/* ---------------- UI ---------------- */

toggleTools.onclick = () => {
  tools.style.display =
    tools.style.display === "none" ? "block" : "none";
};

/* ---------------- FILE LOAD ---------------- */

fileInput.onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  zip = await JSZip.loadAsync(file);

  const folders = new Set();

  Object.keys(zip.files).forEach(path => {
    const parts = path.split("/");
    if (parts.length > 1) folders.add(parts[0]);
  });

  folderSelect.innerHTML = "";

  if (folders.size === 0) folders.add("");

  foldersList = Array.from(folders).sort();

  foldersList.forEach(f => {
    const opt = document.createElement("option");
    opt.value = f;
    opt.textContent = f || "(root)";
    folderSelect.appendChild(opt);
  });

  currentFolder = folderSelect.value;
  loadFolder();
};

/* ---------------- CHANGE CHAPTER ---------------- */

function changeChapter(direction) {
  let index = foldersList.indexOf(currentFolder);
  index += direction;

  if (index < 0 || index >= foldersList.length) return;

  currentFolder = foldersList[index];
  folderSelect.value = currentFolder;

  loadFolder();
  window.scrollTo(0, 0);
}

prevChapter.onclick = () => changeChapter(-1);
nextChapter.onclick = () => changeChapter(1);

folderSelect.onchange = () => {
  currentFolder = folderSelect.value;
  loadFolder();
};

/* ---------------- LOAD IMAGES ---------------- */

async function loadFolder() {
  reader.innerHTML = "";

  const files = Object.keys(zip.files)
    .filter(p => p.startsWith(currentFolder))
    .sort((a, b) =>
      a.localeCompare(b, undefined, { numeric: true })
    );

  for (const path of files) {
    if (!path.match(/\.(jpg|jpeg|png|webp)$/i)) continue;

    const blob = await zip.files[path].async("blob");
    const url = URL.createObjectURL(blob);

    const img = document.createElement("img");
    img.src = url;
    img.loading = "lazy";

    reader.appendChild(img);
  }
}

/* ---------------- AUTO CHAPTER SWITCH ---------------- */

let scrollCooldown = false;

window.addEventListener("scroll", () => {
  if (scrollCooldown) return;

  const scrollTop = window.scrollY;
  const scrollBottom = window.innerHeight + scrollTop;
  const docHeight = document.body.offsetHeight;

  // bottom → next
  if (scrollBottom >= docHeight - 10) {
    scrollCooldown = true;
    changeChapter(1);
    setTimeout(() => scrollCooldown = false, 800);
  }

  // top → prev
  if (scrollTop <= 0) {
    scrollCooldown = true;
    changeChapter(-1);
    setTimeout(() => scrollCooldown = false, 800);
  }
});

/* ---------------- KEYBOARD ---------------- */

document.addEventListener("keydown", (e) => {
  if (e.key === "d") changeChapter(1);
  if (e.key === "a") changeChapter(-1);
});

  openLibrary.onclick = () => {
  libraryInput.click();
};

libraryInput.onchange = async (e) => {
  const files = Array.from(e.target.files);

  // group files by archive
  const archives = {};

  files.forEach(file => {
    const path = file.webkitRelativePath;
    const root = path.split("/")[0];

    if (!archives[root]) archives[root] = [];
    archives[root].push(file);
  });

  library.innerHTML = "";

  for (const name in archives) {
    const fileList = archives[name];

    // find zip file
    const zipFile = fileList.find(f =>
      f.name.match(/\.(zip|cbz)$/i)
    );

    if (!zipFile) continue;

    // load zip
    const zipData = await JSZip.loadAsync(zipFile);

    // find first image
    const imagePath = Object.keys(zipData.files)
      .find(p => p.match(/\.(jpg|jpeg|png|webp)$/i));

    let thumbURL = "";

    if (imagePath) {
      const blob = await zipData.files[imagePath].async("blob");
      thumbURL = URL.createObjectURL(blob);
    }

    const div = document.createElement("div");
    div.className = "book";

    div.innerHTML = `
      <img src="${thumbURL}">
      <span>${name}</span>
    `;

    div.onclick = async () => {
      zip = await JSZip.loadAsync(zipFile);

      // rebuild folder list
      const folders = new Set();

      Object.keys(zip.files).forEach(path => {
        const parts = path.split("/");
        if (parts.length > 1) folders.add(parts[0]);
      });

      folderSelect.innerHTML = "";

      foldersList = Array.from(folders).sort();

      if (foldersList.length === 0) foldersList.push("");

      foldersList.forEach(f => {
        const opt = document.createElement("option");
        opt.value = f;
        opt.textContent = f || "(root)";
        folderSelect.appendChild(opt);
      });

      currentFolder = folderSelect.value;

      library.innerHTML = ""; // hide library
      loadFolder();
    };

    library.appendChild(div);
  }
};
</script>

</body>
</html>
