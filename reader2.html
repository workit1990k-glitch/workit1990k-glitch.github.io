<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manga Reader</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body { margin: 0; background: #111; color: white; font-family: sans-serif; }

#reader { padding-bottom: 100px; }

#reader img {
  display: block;
  margin: 0 auto;
  width: var(--zoom, 100%);
  max-width: 1000px;
  transition: width 0.2s ease;
  filter: var(--sharpenFilter)
          contrast(var(--contrast, 1))
          brightness(var(--brightness, 1))
          grayscale(var(--grayscale, 0));
}

#tools {
  position: fixed;
  top: 10px;
  right: 10px;
  background: #222;
  padding: 12px;
  border-radius: 12px;
  display: none;
  width: 220px;
  z-index: 10;
}

#tools label { font-size: 12px; display: block; }

#tools input { width: 100%; margin-bottom: 10px; }

button {
  position: fixed;
  bottom: 20px;
  background: #444;
  border: none;
  padding: 10px 14px;
  color: white;
  cursor: pointer;
  border-radius: 8px;
  z-index: 20;
}

#toggleTools { right: 20px; }
#prevChapter { left: 20px; }
#nextChapter { left: 90px; }
#openLibrary { left: 160px; }
#openSingle { left: 270px; }
#backToLibrary { left: 20px; display: none; }
#backToLibrary.visible { display: block; }

#fileInput, #libraryInput, #singleInput { display: none; }

#library {
  display: none;
  position: fixed;
  inset: 0;
  background: #111;
  padding: 20px;
  overflow-y: auto;
  z-index: 30;
  grid-template-columns: repeat(auto-fill, 160px);
  gap: 16px;
}

#library.active { display: grid; }

.book {
  cursor: pointer;
  background: #222;
  padding: 8px;
  border-radius: 12px;
  text-align: center;
}

.book img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.loading {
  text-align: center;
  padding: 40px;
  color: #888;
}

.progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: #444;
  width: 100%;
}

.progress-fill {
  height: 100%;
  background: #00a8ff;
  width: 0%;
}
</style>
</head>

<body>

<svg width="0" height="0">
  <filter id="sharpenFilter">
    <feConvolveMatrix id="kernel" kernelMatrix="0 -0.1 0 -0.1 1.2 -0.1 0 -0.1 0"/>
  </filter>
</svg>

<input type="file" id="libraryInput" multiple accept=".zip,.cbz">
<input type="file" id="singleInput" accept=".zip,.cbz">

<div id="library"></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div id="tools">

<label>Zoom <span id="zoomVal"></span>
<input type="range" id="zoom" min="100" max="200" value="100"></label>

<label>Contrast <span id="contrastVal"></span>
<input type="range" id="contrast" min="80" max="150" value="100"></label>

<label>Brightness <span id="brightnessVal"></span>
<input type="range" id="brightness" min="80" max="150" value="100"></label>

<label>Sharpness <span id="sharpnessVal"></span>
<input type="range" id="sharpness" min="0" max="5" value="0"></label>

<label>
Grayscale
<input type="checkbox" id="grayscale">
</label>

<button id="saveFilters" style="position:static;width:100%;">💾 Save</button>

</div>

<button id="toggleTools">Tools</button>
<button id="prevChapter">Prev</button>
<button id="nextChapter">Next</button>
<button id="openLibrary">📚 Library</button>
<button id="openSingle">📖 Open</button>
<button id="backToLibrary">← Library</button>

<div id="reader"></div>

<script>

let zip, currentFolder = "", foldersList = [];
const root = document.documentElement;
const kernel = document.getElementById("kernel");
const libraryEl = document.getElementById("library");
const progressFill = document.getElementById("progressFill");

/* ---------- FILTERS ---------- */
function updateFilters() {
  const z = zoom.value;
  const c = contrast.value / 100;
  const b = brightness.value / 100;
  const s = parseInt(sharpness.value);

  zoomVal.textContent = z + "%";
  contrastVal.textContent = c.toFixed(2);
  brightnessVal.textContent = b.toFixed(2);
  sharpnessVal.textContent = s;

  root.style.setProperty('--zoom', z + '%');
  root.style.setProperty('--contrast', c);
  root.style.setProperty('--brightness', b);
  root.style.setProperty('--grayscale', grayscale.checked ? '1' : '0');

  if (s === 0) {
    root.style.setProperty('--sharpenFilter', '');
    return;
  }

  const surround = (-0.03 * s).toFixed(2);
  const center = (1 + 0.12 * s).toFixed(2);
  kernel.setAttribute("kernelMatrix",
    `0 ${surround} 0 ${surround} ${center} ${surround} 0 ${surround} 0`
  );
  root.style.setProperty('--sharpenFilter', 'url(#sharpenFilter)');
}

[zoom, contrast, brightness, sharpness].forEach(el => el.oninput = updateFilters);
grayscale.onchange = updateFilters;

/* ---------- SAVE / LOAD ---------- */
saveFilters.onclick = () => {
  localStorage.setItem("filters", JSON.stringify({
    zoom: zoom.value,
    contrast: contrast.value,
    brightness: brightness.value,
    sharpness: sharpness.value,
    grayscale: grayscale.checked
  }));
};

(function loadSaved() {
  const s = JSON.parse(localStorage.getItem("filters"));
  if (!s) return;
  zoom.value = s.zoom;
  contrast.value = s.contrast;
  brightness.value = s.brightness;
  sharpness.value = s.sharpness;
  grayscale.checked = s.grayscale;
  updateFilters();
})();

/* ---------- PARALLEL ---------- */
async function processWithConcurrency(items, processor, concurrency = 3) {
  const results = new Array(items.length);
  let index = 0, completed = 0;

  async function worker() {
    while (index < items.length) {
      const i = index++;
      try {
        results[i] = await processor(items[i], i);
      } catch {
        results[i] = null;
      }
      completed++;
      progressFill.style.width = `${(completed/items.length)*100}%`;
    }
  }

  await Promise.all(Array.from({length:concurrency}, worker));
  return results;
}

/* ---------- LIBRARY ---------- */
openLibrary.onclick = () => {
  libraryEl.classList.add('active');
  libraryEl.innerHTML = '<div class="loading">Loading...</div>';
  libraryInput.click();
};

libraryInput.onchange = async e => {
  const files = [...e.target.files];

  const books = await processWithConcurrency(files, async file => {
    const zipTemp = await JSZip.loadAsync(file);
    const imgPath = Object.keys(zipTemp.files)
      .find(p => /\.(jpg|png|jpeg|webp)$/i.test(p));
    if (!imgPath) return null;

    const blob = await zipTemp.files[imgPath].async("blob");
    return {
      file,
      name: file.name,
      thumb: URL.createObjectURL(blob)
    };
  });

  libraryEl.innerHTML = '';

  books.filter(Boolean).forEach(b => {
    const div = document.createElement("div");
    div.className = "book";
    div.innerHTML = `<img src="${b.thumb}"><span>${b.name}</span>`;
    div.onclick = async () => {
      await loadZipFile(b.file);
      libraryEl.classList.remove('active');
    };
    libraryEl.appendChild(div);
  });
};

/* ---------- SINGLE ---------- */
openSingle.onclick = () => singleInput.click();

singleInput.onchange = async e => {
  const file = e.target.files[0];
  if (!file) return;
  await loadZipFile(file);
};

/* ---------- LOAD ZIP ---------- */
async function loadZipFile(file) {
  zip = await JSZip.loadAsync(file);

  const folders = new Set();
  Object.keys(zip.files).forEach(p => {
    const parts = p.split("/");
    if (parts.length > 1) folders.add(parts[0]);
  });

  foldersList = folders.size ? [...folders] : [""];
  currentFolder = foldersList[0];
  loadFolder();
}

/* ---------- LOAD FOLDER ---------- */
async function loadFolder() {
  reader.innerHTML = "";

  const prefix = currentFolder ? currentFolder + "/" : "";

  const files = Object.keys(zip.files)
    .filter(p => p.startsWith(prefix))
    .sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));

  for (const path of files) {
    if (!/\.(jpg|png|jpeg|webp)$/i.test(path)) continue;

    const blob = await zip.files[path].async("blob");
    const img = document.createElement("img");
    img.src = URL.createObjectURL(blob);
    reader.appendChild(img);
  }
}

/* ---------- NAV ---------- */
prevChapter.onclick = () => change(-1);
nextChapter.onclick = () => change(1);

function change(d) {
  const i = foldersList.indexOf(currentFolder) + d;
  if (i < 0 || i >= foldersList.length) return;
  currentFolder = foldersList[i];
  loadFolder();
}

/* ---------- TOOLS ---------- */
toggleTools.onclick = () => {
  tools.style.display = tools.style.display === "none" ? "block" : "none";
};

</script>
</body>
</html>
