<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Novel Scraper</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f8f9fa; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin: 20px 0; }
    input { width: 100%; padding: 12px; border: 2px solid #dee2e6; border-radius: 8px; font-size: 1rem; margin: 8px 0; }
    button { background: #4361ee; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; width: 100%; }
    button:hover { background: #3a56d4; }
    button:disabled { background: #6c757d; cursor: not-allowed; }
    .download-btn { background: #28a745; margin-top: 15px; }
    .download-btn:hover { background: #218838; }
    .progress { margin: 20px 0; display: none; }
    .progress-bar { height: 8px; background: #dee2e6; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: #4361ee; width: 0%; transition: width 0.3s; }
    .log { background: #1e1e1e; color: #d4d4d4; font-family: monospace; font-size: 0.85rem; padding: 12px; border-radius: 8px; max-height: 150px; overflow-y: auto; margin: 15px 0; white-space: pre-wrap; display: none; }
    .log.visible { display: block; }
    .preview { background: #f1f5f9; padding: 15px; border-radius: 8px; margin-top: 15px; display: none; }
    .preview.visible { display: block; }
    .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 10px; }
    .meta-item strong { display: block; color: #6c757d; font-size: 0.85rem; }
    details { margin: 15px 0; }
    summary { cursor: pointer; color: #4361ee; font-weight: 500; }
  </style>
</head>
<body>
  <h1>📚 Novel Scraper</h1>
  <p>Worker-powered • No CORS • Download JSON</p>
  
  <div class="card">
    <input type="url" id="novelUrl" placeholder="https://ixdzs.tw/read/463747/" value="https://ixdzs.tw/read/463747/" />
    
    <details>
      <summary>⚙️ Advanced Options</summary>
      <input type="url" id="workerUrl" placeholder="Worker URL" value="https://novel-scraper.YOUR_SUBDOMAIN.workers.dev" style="margin-top:10px;" />
      <input type="number" id="maxChapters" placeholder="Max chapters (optional)" min="1" style="margin-top:10px;" />
      <label style="margin-top:10px; display:block;">
        <input type="checkbox" id="includeChapters" checked /> Include chapter content
      </label>
    </details>
    
    <button id="scrapeBtn" onclick="startScrape()">🚀 Scrape Novel</button>
    
    <div class="progress" id="progress">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div style="font-size:0.9rem; color:#6c757d; text-align:center; margin-top:8px;" id="progressText">Starting...</div>
    </div>
    
    <div class="log" id="log"></div>
    
    <button id="downloadBtn" class="download-btn" style="display:none;" onclick="downloadJson()">⬇️ Download JSON</button>
    
    <div class="preview" id="preview">
      <strong>📋 Preview</strong>
      <div class="meta-grid" id="metaPreview"></div>
      <div style="margin-top:12px; font-size:0.85rem; color:#6c757d;">
        Chapters: <span id="chapterCount">0</span> • Size: <span id="jsonSize">0 KB</span>
      </div>
    </div>
  </div>

  <script>
    let scrapedData = null;
    let isScraping = false;

    function log(msg, type = 'info') {
      const logEl = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const colors = { info: '#61afef', success: '#98c379', warn: '#e5c07b', error: '#e06c75' };
      logEl.innerHTML += `[${time}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
      logEl.classList.add('visible');
    }

    function updateProgress(percent, text) {
      document.getElementById('progress').style.display = 'block';
      document.getElementById('progressFill').style.width = `${percent}%`;
      document.getElementById('progressText').textContent = text;
    }

    function showPreview(data) {
      scrapedData = data;
      document.getElementById('downloadBtn').style.display = 'block';
      
      const meta = data.meta;
      document.getElementById('metaPreview').innerHTML = `
        <div class="meta-item"><strong>Title</strong>${meta.title}</div>
        <div class="meta-item"><strong>Author</strong>${meta.author || 'Unknown'}</div>
        <div class="meta-item"><strong>Status</strong>${meta.status || 'Unknown'}</div>
        <div class="meta-item"><strong>Chapters</strong>${meta.totalChapters}</div>
        <div class="meta-item"><strong>Genres</strong>${(meta.genres || []).join(', ') || 'None'}</div>
      `;
      
      document.getElementById('chapterCount').textContent = meta.totalChapters;
      const sizeKB = Math.round(JSON.stringify(data).length / 1024);
      document.getElementById('jsonSize').textContent = `${sizeKB} KB`;
      
      document.getElementById('preview').classList.add('visible');
    }

    function downloadJson() {
      if (!scrapedData) return alert('No data to download');
      const blob = new Blob([JSON.stringify(scrapedData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${scrapedData.meta.id || 'novel'}-${scrapedData.meta.title?.slice(0, 30) || 'data'}.json`;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 0);
      log('✅ Download started', 'success');
    }

    async function startScrape() {
      if (isScraping) return;
      
      const novelUrl = document.getElementById('novelUrl').value.trim();
      const workerUrl = document.getElementById('workerUrl').value.trim();
      const maxChapters = document.getElementById('maxChapters').value;
      const includeChapters = document.getElementById('includeChapters').checked;
      
      if (!novelUrl || !workerUrl) {
        alert('Please enter both novel URL and Worker URL');
        return;
      }

      isScraping = true;
      document.getElementById('scrapeBtn').disabled = true;
      document.getElementById('log').innerHTML = '';
      document.getElementById('downloadBtn').style.display = 'none';
      document.getElementById('preview').classList.remove('visible');
      updateProgress(10, 'Sending request...');

      try {
        log('📤 Requesting Worker...');
        
        const response = await fetch(`${workerUrl}/api/scrape`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: novelUrl,
            includeChapters,
            maxChapters: maxChapters ? parseInt(maxChapters) : null
          })
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${response.status}`);
        }

        updateProgress(60, 'Parsing response...');
        const data = await response.json();
        
        if (!data.success) throw new Error(data.error || 'Worker failed');

        updateProgress(100, '✅ Complete!');
        log(`🎉 "${data.meta.title}" - ${data.meta.totalChapters} chapters`, 'success');
        showPreview(data);
        
      } catch (error) {
        log(`❌ ${error.message}`, 'error');
        alert(`Error: ${error.message}`);
        updateProgress(0, 'Failed');
      } finally {
        isScraping = false;
        document.getElementById('scrapeBtn').disabled = false;
      }
    }

    // Init
    document.getElementById('novelUrl').addEventListener('keypress', e => {
      if (e.key === 'Enter' && !isScraping) startScrape();
    });
    log('👋 Ready! Enter URLs and click Scrape.', 'info');
  </script>
</body>
</html>
